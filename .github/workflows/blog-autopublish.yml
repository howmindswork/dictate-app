# blog-autopublish.yml
# Runs every Monday at 9am UTC.
# Reads the first topic from blog/topics-queue.txt, generates a new blog post
# via Claude Haiku, commits it, and pushes. Cloudflare Pages picks up the push
# automatically via its GitHub integration — no CF API secrets needed.
#
# Required secrets (set in repo Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY  — Anthropic API key for post generation
#
# Optional: set CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID + CLOUDFLARE_PROJECT_NAME
# if you want to trigger a manual CF Pages deploy instead of relying on git integration.

name: Blog Auto-Publish

on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday at 09:00 UTC
  workflow_dispatch:        # Also triggerable manually from Actions tab

permissions:
  contents: write           # Needed to commit and push new post

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Check queue is not empty
        id: check-queue
        run: |
          if [ ! -s blog/topics-queue.txt ]; then
            echo "queue_empty=true" >> $GITHUB_OUTPUT
            echo "Queue is empty — skipping generation."
          else
            echo "queue_empty=false" >> $GITHUB_OUTPUT
            TOPIC=$(head -n 1 blog/topics-queue.txt)
            echo "topic=$TOPIC" >> $GITHUB_OUTPUT
            echo "Next topic: $TOPIC"
          fi

      - name: Generate blog post
        if: steps.check-queue.outputs.queue_empty == 'false'
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          OUTPUT=$(python3 scripts/auto_generate_post.py 2>&1)
          echo "$OUTPUT"
          SLUG=$(echo "$OUTPUT" | grep "^GENERATED_SLUG=" | cut -d= -f2)
          echo "slug=$SLUG" >> $GITHUB_OUTPUT

      - name: Commit and push new post
        if: steps.check-queue.outputs.queue_empty == 'false' && steps.generate.outputs.slug != ''
        run: |
          git config user.name "dictate-app-bot"
          git config user.email "bot@dictate.app"
          git add blog/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          SLUG="${{ steps.generate.outputs.slug }}"
          TOPIC="${{ steps.check-queue.outputs.topic }}"
          git commit -m "blog: auto-publish — ${TOPIC:0:60}"
          git push origin ${{ github.ref_name }}
          echo "Pushed: blog/${SLUG}.html"

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.check-queue.outputs.queue_empty }}" = "true" ]; then
            echo "### Skipped — queue empty" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Published: ${{ steps.generate.outputs.slug }}" >> $GITHUB_STEP_SUMMARY
            echo "Topic: ${{ steps.check-queue.outputs.topic }}" >> $GITHUB_STEP_SUMMARY
            echo "Cloudflare Pages will deploy automatically on push." >> $GITHUB_STEP_SUMMARY
          fi

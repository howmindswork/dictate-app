name: Bluesky Auto-Poster

on:
  # Schedule paused — no dictate Bluesky account yet. Re-enable when account is created.
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install atproto
        run: pip install atproto -q

      - name: Post next queued Bluesky post
        continue-on-error: true
        env:
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python3 scripts/bluesky_autopost.py

      - name: Commit updated post index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/bluesky-post-index.txt
          git diff --staged --quiet || git commit -m "chore: advance bluesky post index"
          git push
